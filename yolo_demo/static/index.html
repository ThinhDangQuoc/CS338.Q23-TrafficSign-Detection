<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Sign Assistant</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-strong: #eef3f8;
            --text: #17202a;
            --muted: #637083;
            --line: #d9e1ea;
            --primary: #1f7a8c;
            --primary-dark: #155e6d;
            --warning: #b96b00;
            --danger: #b42318;
            --success: #247a4d;
            --shadow: 0 12px 28px rgba(20, 31, 43, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        h1, h2, h3, p {
            margin: 0;
        }

        h1 {
            font-size: 1.35rem;
            line-height: 1.2;
            letter-spacing: 0;
        }

        h2 {
            font-size: 1rem;
            line-height: 1.3;
            margin-bottom: 14px;
        }

        h3 {
            font-size: 0.92rem;
            line-height: 1.3;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(280px, 360px) minmax(360px, 1fr) minmax(300px, 380px);
            gap: 18px;
            padding: 18px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 18px;
            min-width: 0;
        }

        .controls {
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .drop-zone {
            border: 1px dashed #9badbd;
            background: #f8fafc;
            border-radius: 8px;
            min-height: 220px;
            display: grid;
            place-items: center;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.18s ease, background 0.18s ease;
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: #edf8fb;
        }

        .drop-content {
            display: grid;
            gap: 10px;
            justify-items: center;
            color: var(--muted);
            text-align: center;
        }

        .drop-icon {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: #dcecf1;
            color: var(--primary-dark);
            font-size: 1.4rem;
        }

        .preview-media {
            display: none;
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 6px;
            background: #101820;
        }

        .control-group {
            display: grid;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button, .link-button {
            min-height: 42px;
            border: 1px solid transparent;
            border-radius: 7px;
            padding: 0 14px;
            font: inherit;
            font-weight: 650;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        button.primary {
            background: var(--primary);
            color: white;
        }

        button.primary:hover {
            background: var(--primary-dark);
        }

        .link-button.secondary {
            background: var(--surface);
            border-color: var(--line);
            color: var(--text);
        }

        button:disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }

        .result-panel {
            display: grid;
            grid-template-rows: auto minmax(320px, 1fr) auto;
            gap: 14px;
        }

        .media-stage {
            min-height: 420px;
            border-radius: 8px;
            background: #111827;
            border: 1px solid #1f2937;
            display: grid;
            place-items: center;
            overflow: hidden;
            position: relative;
        }

        .media-stage img,
        .media-stage video {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .placeholder {
            color: #a9b4c2;
            text-align: center;
            padding: 20px;
        }

        .status {
            color: var(--muted);
            font-size: 0.9rem;
            min-height: 22px;
        }

        .detections {
            display: grid;
            gap: 10px;
            max-height: 260px;
            overflow: auto;
            padding-right: 4px;
        }

        .detection-item {
            border: 1px solid var(--line);
            border-left: 4px solid var(--primary);
            border-radius: 7px;
            padding: 10px 12px;
            display: grid;
            gap: 8px;
            background: #fbfcfe;
        }

        .detection-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 9px;
            background: #dcecf1;
            color: var(--primary-dark);
            font-size: 0.8rem;
            font-weight: 700;
            flex: 0 0 auto;
        }

        .warning {
            color: var(--warning);
            font-size: 0.88rem;
            line-height: 1.45;
        }

        .dashboard {
            display: grid;
            gap: 18px;
            align-content: start;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 12px;
            background: #fbfcfe;
            min-height: 78px;
        }

        .metric-value {
            font-size: 1.55rem;
            font-weight: 760;
            margin-top: 6px;
        }

        .metric-label {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .class-list,
        .history-list {
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow: auto;
            padding-right: 4px;
        }

        .class-row,
        .history-row {
            display: grid;
            gap: 4px;
            border-bottom: 1px solid var(--line);
            padding: 8px 0;
        }

        .row-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.9rem;
        }

        .row-note {
            color: var(--muted);
            font-size: 0.78rem;
        }

        .empty {
            color: var(--muted);
            padding: 12px 0;
            font-size: 0.9rem;
        }

        .error {
            color: var(--danger);
        }

        .ok {
            color: var(--success);
        }

        @media (max-width: 1180px) {
            .workspace {
                grid-template-columns: minmax(280px, 360px) minmax(360px, 1fr);
            }

            .dashboard {
                grid-column: 1 / -1;
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 760px) {
            header {
                align-items: flex-start;
                flex-direction: column;
                padding: 16px;
            }

            .workspace {
                grid-template-columns: 1fr;
                padding: 12px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .button-row,
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .media-stage {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Traffic Sign Assistant</h1>
            <p class="subtitle">Hệ thống nhận dạng và cảnh báo biển báo giao thông dùng YOLO</p>
        </div>
        <a class="link-button secondary" href="/report">CSV</a>
    </header>

    <main class="workspace">
        <section class="panel controls">
            <h2>Nguồn đầu vào</h2>
            <label class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" hidden accept="image/*,video/*">
                <span class="drop-content" id="dropPrompt">
                    <span class="drop-icon">+</span>
                    <strong>Chọn ảnh hoặc video</strong>
                    <span id="fileName">JPG, PNG, MP4, AVI, MOV</span>
                </span>
                <img class="preview-media" id="previewImage" alt="Preview">
                <video class="preview-media" id="previewVideo" muted controls></video>
            </label>

            <div class="control-group">
                <div class="label-row">
                    <span>Confidence</span>
                    <strong id="confValue">0.50</strong>
                </div>
                <input type="range" id="confRange" min="0.05" max="1" step="0.05" value="0.5">
            </div>

            <div class="button-row">
                <button class="primary" id="predictBtn" disabled>
                    <span>▶</span>
                    <span>Nhận dạng</span>
                </button>
                <a class="link-button secondary" href="/report">
                    <span>↓</span>
                    <span>Xuất CSV</span>
                </a>
            </div>
            <p class="status" id="statusText"></p>
        </section>

        <section class="panel result-panel">
            <div>
                <h2>Kết quả nhận dạng</h2>
                <p class="status" id="resultSummary">Chưa có kết quả.</p>
            </div>
            <div class="media-stage">
                <img id="resultImage" alt="Detected image">
                <video id="resultVideo" controls></video>
                <div class="placeholder" id="placeholder">Output sẽ hiển thị tại đây</div>
            </div>
            <div>
                <h2>Cảnh báo</h2>
                <div class="detections" id="detectionList"></div>
            </div>
        </section>

        <aside class="dashboard">
            <section class="panel">
                <h2>Thống kê</h2>
                <div class="stats-grid">
                    <div class="metric">
                        <div class="metric-label">Tổng phát hiện</div>
                        <div class="metric-value" id="totalDetections">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Xuất hiện nhiều nhất</div>
                        <div class="metric-value" id="topCount">0</div>
                    </div>
                </div>
                <div class="class-list" id="classList"></div>
            </section>

            <section class="panel">
                <h2>Lịch sử gần đây</h2>
                <div class="history-list" id="historyList"></div>
            </section>
        </aside>
    </main>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dropPrompt = document.getElementById('dropPrompt');
        const fileName = document.getElementById('fileName');
        const previewImage = document.getElementById('previewImage');
        const previewVideo = document.getElementById('previewVideo');
        const confRange = document.getElementById('confRange');
        const confValue = document.getElementById('confValue');
        const predictBtn = document.getElementById('predictBtn');
        const statusText = document.getElementById('statusText');
        const resultSummary = document.getElementById('resultSummary');
        const resultImage = document.getElementById('resultImage');
        const resultVideo = document.getElementById('resultVideo');
        const placeholder = document.getElementById('placeholder');
        const detectionList = document.getElementById('detectionList');
        const totalDetections = document.getElementById('totalDetections');
        const topCount = document.getElementById('topCount');
        const classList = document.getElementById('classList');
        const historyList = document.getElementById('historyList');

        let selectedFile = null;

        confRange.addEventListener('input', () => {
            confValue.textContent = Number(confRange.value).toFixed(2);
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('active');
            if (event.dataTransfer.files.length > 0) {
                handleFile(event.dataTransfer.files[0]);
            }
        });

        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('conf', confRange.value);

            predictBtn.disabled = true;
            statusText.textContent = 'Đang xử lý...';
            statusText.className = 'status';

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Không thể nhận dạng file này.');
                }
                renderResult(data);
                renderDashboard(data);
                statusText.textContent = 'Hoàn tất.';
                statusText.className = 'status ok';
            } catch (error) {
                statusText.textContent = error.message;
                statusText.className = 'status error';
            } finally {
                predictBtn.disabled = false;
            }
        });

        function handleFile(file) {
            selectedFile = file;
            predictBtn.disabled = false;
            fileName.textContent = file.name;
            dropPrompt.style.display = 'none';
            previewImage.style.display = 'none';
            previewVideo.style.display = 'none';

            const url = URL.createObjectURL(file);
            if (file.type.startsWith('video/')) {
                previewVideo.src = url;
                previewVideo.style.display = 'block';
            } else {
                previewImage.src = url;
                previewImage.style.display = 'block';
            }
        }

        function renderResult(data) {
            const outputUrl = `${data.output_url}?t=${Date.now()}`;
            resultImage.style.display = 'none';
            resultVideo.style.display = 'none';
            placeholder.style.display = 'none';

            if (data.media_type === 'video') {
                resultVideo.src = outputUrl;
                resultVideo.style.display = 'block';
            } else {
                resultImage.src = outputUrl;
                resultImage.style.display = 'block';
            }

            resultSummary.textContent = `${data.count} phát hiện được lưu vào lịch sử.`;
            renderDetections(data.detections || []);
        }

        function renderDetections(detections) {
            if (!detections.length) {
                detectionList.innerHTML = '<div class="empty">Không phát hiện biển báo nào.</div>';
                return;
            }

            detectionList.innerHTML = detections.map((item) => `
                <div class="detection-item">
                    <div class="detection-top">
                        <h3>${escapeHtml(item.class_name)}</h3>
                        <span class="badge">${Number(item.confidence).toFixed(2)}%</span>
                    </div>
                    <p class="warning">${escapeHtml(item.warning_message || '')}</p>
                </div>
            `).join('');
        }

        function renderDashboard(data) {
            const stats = data.stats || { total: 0, by_class: [], top_sign: null };
            totalDetections.textContent = stats.total || 0;
            topCount.textContent = stats.top_sign ? stats.top_sign.count : 0;

            if (!stats.by_class || !stats.by_class.length) {
                classList.innerHTML = '<div class="empty">Chưa có thống kê.</div>';
            } else {
                classList.innerHTML = stats.by_class.map((item) => `
                    <div class="class-row">
                        <div class="row-top">
                            <strong>${escapeHtml(item.sign_name)}</strong>
                            <span>${item.count}</span>
                        </div>
                    </div>
                `).join('');
            }

            const history = data.history || [];
            if (!history.length) {
                historyList.innerHTML = '<div class="empty">Chưa có lịch sử.</div>';
            } else {
                historyList.innerHTML = history.map((item) => `
                    <div class="history-row">
                        <div class="row-top">
                            <strong>${escapeHtml(item.sign_name)}</strong>
                            <span>${Number(item.confidence).toFixed(1)}%</span>
                        </div>
                        <div class="row-note">${escapeHtml(item.source_type)} · ${escapeHtml(item.detected_at)}</div>
                    </div>
                `).join('');
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        async function loadDashboard() {
            try {
                const response = await fetch('/dashboard');
                if (response.ok) {
                    renderDashboard(await response.json());
                }
            } catch (error) {
                historyList.innerHTML = '<div class="empty">Không tải được lịch sử.</div>';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
