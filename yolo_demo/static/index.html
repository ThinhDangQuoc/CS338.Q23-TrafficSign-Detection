<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv11 Traffic Sign Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.15) 0px, transparent 50%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .drop-zone {
            width: 100%;
            height: 300px;
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-zone.active {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
        }

        .drop-zone i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .btn {
            background: linear-gradient(to right, var(--secondary), var(--primary));
            color: var(--bg-dark);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .result-img-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #resultImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .detection-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .detection-list::-webkit-scrollbar {
            width: 6px;
        }

        .detection-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .detection-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease forwards;
        }

        .detection-info h4 {
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .detection-info p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .badge {
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            color: #475569;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>YOLOv11 Traffic Dashboard</h1>
        <p>Interactive Real-time Road Sign Detection System</p>
    </header>

    <div class="container">
        <!-- Control Panel -->
        <div class="glass-panel upload-section">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Upload & Config</h2>
            
            <div class="drop-zone" id="dropZone">
                <div id="uploadPrompt">
                    <i class="icon">📁</i>
                    <p>Drag & drop or click to upload</p>
                    <span style="font-size: 0.8rem; color: #64748b;">Supports JPG, PNG</span>
                </div>
                <img id="previewImg" class="preview-img" style="display: none;">
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>
                        <span>Confidence Threshold</span>
                        <span id="confValue">0.25</span>
                    </label>
                    <input type="range" id="confRange" min="0.05" max="1.0" step="0.05" value="0.25">
                </div>
                <button class="btn" id="predictBtn" disabled>
                    <span>Run Inference</span>
                    <i>🚀</i>
                </button>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="glass-panel results-section">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Detections</h2>
            
            <div class="result-img-container">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem;">Analyzing image...</p>
                </div>
                <img id="resultImage" alt="Result will appear here">
                <div id="placeholderText" class="empty-state">No image analyzed yet</div>
            </div>

            <div class="detection-list" id="detectionList">
                <!-- Detections will be injected here -->
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const predictBtn = document.getElementById('predictBtn');
        const confRange = document.getElementById('confRange');
        const confValue = document.getElementById('confValue');
        const resultImage = document.getElementById('resultImage');
        const detectionList = document.getElementById('detectionList');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const placeholderText = document.getElementById('placeholderText');

        let selectedFile = null;

        // Threshold update
        confRange.addEventListener('input', (e) => {
            confValue.textContent = e.target.value;
        });

        // File Selection
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                uploadPrompt.style.display = 'none';
                predictBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // Prediction
        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingOverlay.style.display = 'flex';
            predictBtn.disabled = true;
            placeholderText.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('conf', confRange.value);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.image) {
                    resultImage.src = `data:image/jpeg;base64,${data.image}`;
                    renderDetections(data.detections);
                } else {
                    alert('Error during prediction');
                }
            } catch (error) {
                console.error(error);
                alert('Server connection failed');
            } finally {
                loadingOverlay.style.display = 'none';
                predictBtn.disabled = false;
            }
        });

        function renderDetections(detections) {
            detectionList.innerHTML = '';
            if (detections.length === 0) {
                detectionList.innerHTML = '<div class="empty-state">No traffic signs detected</div>';
                return;
            }

            detections.forEach(det => {
                const item = document.createElement('div');
                item.className = 'detection-item';
                item.innerHTML = `
                    <div class="detection-info">
                        <h4>${det.class_name}</h4>
                        <p>Confidence score</p>
                    </div>
                    <span class="badge">${det.confidence}%</span>
                `;
                detectionList.appendChild(item);
            });
        }
    </script>
</body>
</html>
